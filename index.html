<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=MuseoModerno:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="sources/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <title>Jamie's Weather App</title>
  </head>
  <body>
    <header>
      <h1>Weather Forecast</h1>
      <p class="subHead">Check the weather for cities from around the world.</p>
      <form class="cityForm" id="searchForm">
        <input
          type="search"
          placeholder="Enter a city"
          required
          id="cityInput"
          class="cityInput"
        />
        <input type="submit" value="Search" class="cityButton" />
      </form>
    </header>
    <main>
      <container class="searchCity">
        <div class="location">
          <h2 id="cityName"></h2>
          <h3 id="countryName"></h3>
          <p class="date" id="date">tuesday</p>
          <div class="mainEmoji" id="emoji"></div>
          <p class="currentStats">
            <span class="currentTemp" id="currentTemp"></span>
            <span class="celcius">°C</span>
            <br />
            <span id="conditions"></span>
            <br />
            Feels like <span id="feelsLike"></span>°
          </p>
          <hr />
          <container class="additionalInfo">
            <div class="smallEmoji">💧</div>
            <div class="secondaryInfo">
              Humidity
              <br />
              <span id="humidity"></span>%
            </div>
            <div class="smallEmoji">💨</div>
            <div class="secondaryInfo">
              Wind Speed
              <br />
              <span id="wind"></span> km/h
            </div>
          </container>
        </div>
      </container>
    </main>

    <footer>
      This project was coded by
      <a href="https://github.com/jamieranick" target="_blank">Jamie Ranick</a>,
      open-sourced on
      <a
        href="https://github.com/jamieranick/searchable-weather-app"
        target="_blank"
        >GitHub</a
      >, and hosted on
      <a href="https://jamiesweatherforecast.netlify.app/" target="_blank"
        >Netfly</a
      >.
    </footer>
    <script src="sources/script.js"></script>
  </body>
</html>
